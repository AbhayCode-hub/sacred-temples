<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacred Temples — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0b;
      --surface:   #111114;
      --surface2:  #18181d;
      --border:    #222228;
      --border2:   #2e2e38;
      --gold:      #c9a84c;
      --gold-dim:  #7a5f28;
      --gold-glow: rgba(201,168,76,.15);
      --text:      #e8e6e0;
      --text-muted:#7a7870;
      --text-dim:  #4a4840;
      --green:     #3dbd7d;
      --green-bg:  rgba(61,189,125,.1);
      --red:       #e05757;
      --red-bg:    rgba(224,87,87,.1);
      --amber:     #e8a030;
      --amber-bg:  rgba(232,160,48,.1);
      --blue:      #5b8dee;
      --radius:    10px;
      --radius-lg: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .4;
    }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark::before {
      content: '⛩';
      font-size: 18px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-label {
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 12px 6px;
      font-weight: 500;
    }

    .filter-tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      transition: all .2s;
      text-align: left;
      width: 100%;
    }

    .filter-tab:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .filter-tab.active {
      background: var(--gold-glow);
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .tab-label { display: flex; align-items: center; gap: 10px; }
    .tab-icon { font-size: 15px; opacity: .8; }

    .tab-count {
      font-size: 11px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
    }

    .filter-tab.active .tab-count {
      background: var(--gold-dim);
      color: var(--gold);
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .topbar-left h1 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .05em;
    }

    .topbar-left p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .result-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--surface);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-card.pending .stat-value { color: var(--amber); }
    .stat-card.approved .stat-value { color: var(--green); }
    .stat-card.rejected .stat-value { color: var(--red); }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Content area ── */
    .content-area {
      flex: 1;
      padding: 28px 32px;
      max-width: 900px;
    }

    /* ── Review Cards ── */
    .review-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin-bottom: 14px;
      transition: border-color .2s, transform .2s;
      animation: slideIn .3s both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .review-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .review-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .reviewer-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--surface2));
      border: 1px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
    }

    .reviewer-meta { flex: 1; }

    .reviewer-name {
      font-weight: 500;
      color: var(--text);
      font-size: 15px;
    }

    .reviewer-temple {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .review-right { text-align: right; flex-shrink: 0; }

    .stars-row { margin-bottom: 4px; }

    .star { color: var(--text-dim); font-size: 14px; }
    .star.filled { color: var(--gold); }

    .review-time {
      font-size: 11px;
      color: var(--text-dim);
    }

    .review-body { margin-bottom: 16px; }

    .review-text {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
      font-style: italic;
    }

    .review-images {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .review-thumb {
      width: 70px; height: 70px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s, border-color .2s;
    }

    .review-thumb:hover {
      transform: scale(1.05);
      border-color: var(--gold-dim);
    }

    .review-card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
    }

    .action-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }

    .approve-btn { border-color: rgba(61,189,125,.3); color: var(--green); background: var(--green-bg); }
    .approve-btn:hover { border-color: var(--green); background: rgba(61,189,125,.18); color: var(--green); }

    .reject-btn { border-color: rgba(224,87,87,.3); color: var(--red); background: var(--red-bg); }
    .reject-btn:hover { border-color: var(--red); background: rgba(224,87,87,.18); color: var(--red); }

    .email-btn { margin-right: auto; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: capitalize;
      margin-left: auto;
    }

    .status-approved { background: var(--green-bg); color: var(--green); border: 1px solid rgba(61,189,125,.2); }
    .status-rejected { background: var(--red-bg); color: var(--red); border: 1px solid rgba(224,87,87,.2); }

    /* ── Empty & Loading ── */
    .empty-state, .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-icon {
      font-size: 40px;
      color: var(--text-dim);
      line-height: 1;
      font-family: 'Cinzel', serif;
    }

    .empty-state h3 { font-size: 16px; color: var(--text); font-weight: 400; }
    .empty-state p  { font-size: 13px; color: var(--text-dim); }

    .loader {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 32px;
      min-width: 320px;
      max-width: 90vw;
      transform: translateY(10px) scale(.97);
      transition: transform .2s;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    .modal-overlay.active .modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: .1em;
      color: var(--gold);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .email-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      letter-spacing: .02em;
      word-break: break-all;
      margin-bottom: 20px;
    }

    .modal-close {
      display: flex;
      justify-content: flex-end;
    }

    .btn-close {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-close:hover { color: var(--text); border-color: var(--gold-dim); }

    .image-modal-content { text-align: center; }

    .image-modal-content img {
      max-width: 80vw;
      max-height: 75vh;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 14px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      z-index: 9000;
      transform: translateY(20px);
      opacity: 0;
      transition: all .25s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { border-color: rgba(61,189,125,.4); color: var(--green); }
    .toast-error   { border-color: rgba(224,87,87,.4); color: var(--red); }
    .toast-warning { border-color: rgba(232,160,48,.4); color: var(--amber); }

    /* ── Divider line ── */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 32px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 12px; }
      .sidebar-logo { border-bottom: none; border-right: 1px solid var(--border); padding: 8px 16px; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; padding: 8px; gap: 4px; }
      .sidebar-footer { display: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .content-area { padding: 16px; }
      .topbar { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Sacred Temples</div>
      <div class="logo-sub">Admin Control</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Review Queue</div>

      <button class="filter-tab active" data-filter="pending">
        <span class="tab-label">
          <span class="tab-icon">◐</span>
          Pending
        </span>
        <span class="tab-count" id="pendingCount">—</span>
      </button>

      <button class="filter-tab" data-filter="approved">
        <span class="tab-label">
          <span class="tab-icon">✓</span>
          Approved
        </span>
        <span class="tab-count" id="approvedCount">—</span>
      </button>

      <button class="filter-tab" data-filter="rejected">
        <span class="tab-label">
          <span class="tab-icon">✕</span>
          Rejected
        </span>
        <span class="tab-count" id="rejectedCount">—</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <span class="status-dot"></span>
      Connected · Firebase
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1>Review Moderation</h1>
        <p>Manage and moderate visitor reviews</p>
      </div>
      <div class="result-count" id="resultCount">Loading…</div>
    </header>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card pending">
        <div class="stat-label">Awaiting</div>
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-sub">pending reviews</div>
      </div>
      <div class="stat-card approved">
        <div class="stat-label">Published</div>
        <div class="stat-value" id="approvedCount">0</div>
        <div class="stat-sub">approved reviews</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-label">Rejected</div>
        <div class="stat-value" id="rejectedCount">0</div>
        <div class="stat-sub">declined reviews</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-sub">all reviews</div>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- Content -->
    <div class="content-area">
      <div id="reviewsContent">
        <div class="loading-state">
          <div class="loader"></div>
          <p>Loading reviews…</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
  <div class="modal-box">
    <div class="modal-title">Reviewer Email</div>
    <div class="email-display" id="modalEmailText"></div>
    <div class="modal-close">
      <button class="btn-close" onclick="closeEmailModal()">Close</button>
    </div>
  </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="imageModal">
  <div class="modal-box image-modal-content">
    <img id="modalImage" src="" alt="Review image" />
    <div class="modal-close" style="margin-top: 16px;">
      <button class="btn-close" onclick="closeImageModal()">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module" src="./admin-panel.js"></script>
</body>
</html>
