<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Review Moderation | Sacred Temples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 5px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            padding: 30px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .reviews-container {
            display: grid;
            gap: 20px;
        }

        .review-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .review-info {
            flex: 1;
        }

        .reviewer-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .temple-name {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .review-meta {
            font-size: 13px;
            color: #999;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stars {
            color: #ffc107;
            font-size: 14px;
        }

        .review-content {
            margin: 15px 0;
            line-height: 1.6;
            color: #555;
        }

        .review-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .review-images img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .review-images img:hover {
            transform: scale(1.05);
        }

        .review-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #4caf50;
            color: white;
        }

        .btn-approve:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .btn-reject:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        .btn-view-email {
            background: #2196f3;
            color: white;
        }

        .btn-view-email:hover {
            background: #0b7dda;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h2 {
            color: #999;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #bbb;
        }

        .email-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #000;
        }

        .modal-email {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            word-break: break-all;
            font-family: monospace;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .image-modal.active {
            display: flex;
        }

        .modal-image {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 5px;
        }

        .image-close {
            color: white;
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .stats {
                width: 100%;
                justify-content: space-around;
            }

            .review-header {
                flex-direction: column;
                gap: 10px;
            }

            .review-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🛕 Review Moderation Center</h1>
                <p style="font-size: 14px; opacity: 0.9; margin-top: 5px;">Manage and approve user reviews</p>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="pendingCount">0</span>
                    <span>Pending</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="success-message" id="successMessage"></div>

            <div class="filters">
                <button class="filter-btn active" onclick="loadReviews('pending')">⏳ Pending Reviews</button>
                <button class="filter-btn" onclick="loadReviews('approved')">✅ Approved</button>
                <button class="filter-btn" onclick="loadReviews('rejected')">❌ Rejected</button>
            </div>

            <div id="reviewsContent" class="reviews-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading reviews...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Email Modal -->
    <div id="emailModal" class="email-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEmailModal()">&times;</span>
            <h3>Reviewer Email</h3>
            <div class="modal-email" id="modalEmail"></div>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">For verification purposes only</p>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="image-close" onclick="closeImageModal()">&times;</span>
        <img id="modalImage" class="modal-image" src="" alt="">
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        let currentFilter = 'pending';
        let allReviews = [];

        // Fetch pending reviews
        async function fetchPendingReviews() {
            try {
                const temples = await getDocs(collection(db, 'temples'));
                const pendingReviews = [];

                for (const templeDoc of temples.docs) {
                    const templeId = templeDoc.id;
                    const reviewsCollection = collection(db, `temples/${templeId}/reviews`);
                    const q = query(reviewsCollection, where('status', '==', 'pending'));
                    const snapshot = await getDocs(q);

                    snapshot.forEach(doc => {
                        pendingReviews.push({
                            id: doc.id,
                            templeId: templeId,
                            templeName: templeDoc.data().name || 'Unknown Temple',
                            ...doc.data(),
                            timestamp: doc.data().timestamp?.toDate?.() || new Date(doc.data().createdAt)
                        });
                    });
                }

                return pendingReviews.sort((a, b) => {
                    const dateA = new Date(a.timestamp || a.createdAt);
                    const dateB = new Date(b.timestamp || b.createdAt);
                    return dateB - dateA;
                });
            } catch (error) {
                console.error('❌ Error fetching pending reviews:', error);
                return [];
            }
        }

        // Approve a review
        async function approveReview(templeId, reviewId) {
            try {
                const reviewRef = doc(db, `temples/${templeId}/reviews`, reviewId);
                await updateDoc(reviewRef, {
                    status: 'approved',
                    updatedAt: new Date().toISOString()
                });
                console.log('✅ Review approved:', reviewId);
                return { success: true, message: 'Review approved successfully!' };
            } catch (error) {
                console.error('❌ Error approving review:', error);
                return { success: false, error: error.message };
            }
        }

        // Reject a review
        async function rejectReview(templeId, reviewId) {
            try {
                const reviewRef = doc(db, `temples/${templeId}/reviews`, reviewId);
                await updateDoc(reviewRef, {
                    status: 'rejected',
                    updatedAt: new Date().toISOString()
                });
                console.log('✅ Review rejected:', reviewId);
                return { success: true, message: 'Review rejected successfully!' };
            } catch (error) {
                console.error('❌ Error rejecting review:', error);
                return { success: false, error: error.message };
            }
        }

        // Fetch reviews by status
        async function fetchAllReviewsByStatus(status) {
            try {
                const temples = await getDocs(collection(db, 'temples'));
                const reviews = [];

                for (const templeDoc of temples.docs) {
                    const templeId = templeDoc.id;
                    const reviewsCollection = collection(db, `temples/${templeId}/reviews`);
                    const q = query(reviewsCollection, where('status', '==', status));
                    const snapshot = await getDocs(q);

                    snapshot.forEach(doc => {
                        reviews.push({
                            id: doc.id,
                            templeId: templeId,
                            templeName: templeDoc.data().name || 'Unknown Temple',
                            ...doc.data(),
                            timestamp: doc.data().timestamp?.toDate?.() || new Date(doc.data().createdAt)
                        });
                    });
                }

                return reviews.sort((a, b) => {
                    const dateA = new Date(a.timestamp || a.createdAt);
                    const dateB = new Date(b.timestamp || b.createdAt);
                    return dateB - dateA;
                });
            } catch (error) {
                console.error('Error fetching reviews:', error);
                return [];
            }
        }

        // Initial load
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Admin panel loaded');
            loadReviews('pending');
        });

        window.loadReviews = async function(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }

            const content = document.getElementById('reviewsContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading reviews...</p></div>';

            try {
                console.log('Loading reviews with filter:', filter);
                if (filter === 'pending') {
                    allReviews = await fetchPendingReviews();
                    console.log('Pending reviews loaded:', allReviews);
                } else {
                    allReviews = await fetchAllReviewsByStatus(filter);
                    console.log('Reviews with status:', filter, allReviews);
                }

                displayReviews(allReviews);
                updateStats();
            } catch (error) {
                console.error('Full error:', error);
                content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h2>Error loading reviews</h2><p>${error.message}</p><p style="font-size: 12px; color: #999; margin-top: 10px;">Check browser console (F12) for details</p></div>`;
            }
        };

        function displayReviews(reviews) {
            const content = document.getElementById('reviewsContent');
            
            if (reviews.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h2>No reviews found</h2>
                        <p>There are no ${currentFilter} reviews at the moment.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = reviews.map(review => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="review-info">
                            <div class="reviewer-name">${escapeHtml(review.userName)}</div>
                            <div class="temple-name">🛕 ${escapeHtml(review.templeName)}</div>
                            <div class="review-meta">
                                <div>
                                    <span class="stars">${'⭐'.repeat(review.rating)}</span>
                                    <span style="color: #666;">${review.rating}/5</span>
                                </div>
                                <div>${formatDate(review.timestamp)}</div>
                                ${review.status ? `<span class="status-badge status-${review.status}">${review.status.toUpperCase()}</span>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="review-content">
                        "${escapeHtml(review.text.substring(0, 200))}${review.text.length > 200 ? '...' : ''}"
                    </div>

                    ${review.images && review.images.length > 0 ? `
                        <div class="review-images">
                            ${review.images.map(img => `
                                <img src="${img.url}" alt="Review image" onclick="openImageModal('${img.url}')" style="cursor: pointer;">
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="review-actions">
                        <button class="btn btn-view-email" onclick="showEmailModal('${escapeHtml(review.email)}')">📧 View Email</button>
                        ${currentFilter === 'pending' ? `
                            <button class="btn btn-approve" onclick="handleApprove('${review.templeId}', '${review.id}')">✅ Approve</button>
                            <button class="btn btn-reject" onclick="handleReject('${review.templeId}', '${review.id}')">❌ Reject</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        window.handleApprove = async function(templeId, reviewId) {
            if (confirm('Approve this review?')) {
                const result = await approveReview(templeId, reviewId);
                if (result.success) {
                    showSuccessMessage('✅ Review approved successfully!');
                    loadReviews('pending');
                } else {
                    alert('Error: ' + result.error);
                }
            }
        };

        window.handleReject = async function(templeId, reviewId) {
            if (confirm('Reject this review?')) {
                const result = await rejectReview(templeId, reviewId);
                if (result.success) {
                    showSuccessMessage('❌ Review rejected successfully!');
                    loadReviews('pending');
                } else {
                    alert('Error: ' + result.error);
                }
            }
        };

        window.showEmailModal = function(email) {
            document.getElementById('modalEmail').textContent = email;
            document.getElementById('emailModal').style.display = 'block';
        };

        window.closeEmailModal = function() {
            document.getElementById('emailModal').style.display = 'none';
        };

        window.openImageModal = function(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        };

        window.closeImageModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        function showSuccessMessage(message) {
            const msgEl = document.getElementById('successMessage');
            msgEl.textContent = message;
            msgEl.classList.add('show');
            setTimeout(() => msgEl.classList.remove('show'), 3000);
        }

        async function updateStats() {
            const pending = await fetchPendingReviews();
            document.getElementById('pendingCount').textContent = pending.length;
        }

        function formatDate(date) {
            if (!date) return 'Recently';
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const emailModal = document.getElementById('emailModal');
            const imageModal = document.getElementById('imageModal');
            
            if (event.target === emailModal) {
                emailModal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
